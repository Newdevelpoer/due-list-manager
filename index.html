<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insurance Policy Sheet Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;font-size:14px;background:#f5f5f5;color:#222;padding:20px;max-width:1200px;margin:0 auto}
h1{font-size:18px;margin-bottom:16px;border-bottom:2px solid #333;padding-bottom:8px}
.row{display:flex;gap:20px;margin-bottom:16px}
.col{flex:1;min-width:0}
label{font-weight:bold;display:block;margin-bottom:6px}
.drop-zone{border:2px dashed #888;padding:30px 16px;text-align:center;cursor:pointer;background:#fff;transition:all .2s}
.drop-zone:hover{border-color:#333;background:#f0f0f0}
.drop-zone.over{border-color:#333;background:#e8e8e8}
.drop-zone input{display:none}
.drop-zone p.hint{color:#888;font-size:12px;margin-top:6px}
.stats{background:#fff;padding:8px 12px;border:1px solid #ddd;margin-bottom:12px;display:flex;gap:20px;font-size:13px;align-items:center}
.stats span{font-weight:bold}
.log{background:#111;color:#0f0;padding:10px;font-size:13px;max-height:160px;overflow-y:auto;margin-bottom:12px;white-space:pre-wrap;min-height:36px}
.log .err{color:#f44}
.log .ok{color:#0f0}
table{width:100%;border-collapse:collapse;background:#fff;font-size:12px}
th,td{border:1px solid #ccc;padding:4px 8px;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
th{background:#333;color:#fff;cursor:pointer;user-select:none;padding:6px 8px;transition:background .15s;position:relative}
th:hover{background:#555}
th.sorted-asc::after{content:" ▲";font-size:10px}
th.sorted-desc::after{content:" ▼";font-size:10px}
tr:hover td{background:#f0f0f0}
td{cursor:default;transition:background .1s}
td::selection{background:#b3d4fc}
.btn{padding:6px 16px;border:2px solid #333;background:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:bold;transition:all .15s;user-select:none}
.btn:hover{background:#333;color:#fff;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-danger{border-color:#c00;color:#c00}
.btn-danger:hover{background:#c00;color:#fff}
.btn-go{border-color:#060;color:#060;margin-top:8px}
.btn-go:hover{background:#060;color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.filename{font-size:13px;margin-top:6px;color:#555}
.summary{background:#fff;padding:10px;border:1px solid #ddd;margin-top:8px;font-size:13px}
.loading{color:#888;font-style:italic}
@media(max-width:700px){.row{flex-direction:column}}
</style>
</head>
<body>
<h1>Insurance Policy Sheet Manager</h1>

<div class="row">
  <div class="col">
    <label>1. Upload Master Data</label>
    <div class="drop-zone" id="uploadZone">
      <p>Drop files here or click to upload</p>
      <p class="hint">.xlsx .xls .xlsm .csv .jpg .jpeg .png .doc .docx (multiple)</p>
      <input type="file" id="uploadInput" multiple accept=".xlsx,.xls,.xlsm,.csv,.jpg,.jpeg,.png,.doc,.docx">
    </div>
  </div>
  <div class="col">
    <label>2. Generate Output Sheet</label>
    <div class="drop-zone" id="outputZone">
      <p>Drop authority Excel file here or click</p>
      <p class="hint">.xlsx .xls only (single file)</p>
      <input type="file" id="outputInput" accept=".xlsx,.xls">
    </div>
    <div class="filename" id="outputFilename"></div>
    <button class="btn btn-go" id="generateBtn" onclick="generateOutput()" style="display:none">Generate Output</button>
    <div id="outputStatus"></div>
    <div class="summary" id="outputSummary" style="display:none"></div>
  </div>
</div>

<div class="log" id="uploadLog">Ready.</div>

<div class="stats">
  <div>Records: <span id="totalCount">0</span></div>
  <div>Last upload: <span id="lastUpdate">—</span></div>
  <div style="margin-left:auto"><button class="btn btn-danger" onclick="clearAll()">Clear All</button></div>
</div>

<div style="overflow-x:auto">
  <table id="previewTable">
    <thead><tr id="previewHead"></tr></thead>
    <tbody id="previewBody"></tbody>
  </table>
</div>

<script>
const COLS = ['sn','policyno','name','doc','fup','sumass','plan','mode','premium','mobileno','status'];
let sortCol = -1, sortAsc = true, outputFile = null;

function setupDrop(zoneId, inputId, handler) {
  const zone = document.getElementById(zoneId), input = document.getElementById(inputId);
  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('over'); handler(e.dataTransfer.files); });
  input.addEventListener('change', () => { if(input.files.length) handler(input.files); input.value=''; });
}

setupDrop('uploadZone', 'uploadInput', async files => {
  const log = document.getElementById('uploadLog');
  log.textContent = '';
  const fd = new FormData();
  for (const f of files) { fd.append('files', f); log.innerHTML += `Uploading ${f.name}...\n`; }
  try {
    const res = await fetch('/upload', { method:'POST', body:fd });
    const data = await res.json();
    log.innerHTML += `<span class="ok">Done: ${data.inserted} inserted, ${data.updated} updated</span>\n`;
    if (data.errors.length) data.errors.forEach(e => log.innerHTML += `<span class="err">${e.file}: ${e.error}</span>\n`);
  } catch(e) { log.innerHTML += `<span class="err">Upload failed: ${e.message}</span>\n`; }
  log.scrollTop = log.scrollHeight;
  refreshStats(); refreshPreview();
});

async function refreshStats() {
  try {
    const data = await (await fetch('/master/count')).json();
    document.getElementById('totalCount').textContent = data.count;
    document.getElementById('lastUpdate').textContent = data.last_updated || '—';
  } catch(e) {}
}

async function refreshPreview() {
  try {
    const rows = await (await fetch('/master?limit=50')).json();
    const head = document.getElementById('previewHead');
    const body = document.getElementById('previewBody');
    head.innerHTML = COLS.map((c,i) => {
      let cls = '';
      if (sortCol === i) cls = sortAsc ? 'sorted-asc' : 'sorted-desc';
      return `<th class="${cls}" onclick="sortPreview(${i})">${c}</th>`;
    }).join('');
    body.innerHTML = rows.map(r => '<tr>' + COLS.map(c => `<td title="${r[c]||''}">${r[c]||''}</td>`).join('') + '</tr>').join('');
  } catch(e) {}
}

function sortPreview(i) {
  if (sortCol===i) sortAsc=!sortAsc; else { sortCol=i; sortAsc=true; }
  const body = document.getElementById('previewBody');
  const rows = [...body.querySelectorAll('tr')];
  rows.sort((a,b) => {
    const va=a.children[i].textContent, vb=b.children[i].textContent;
    return sortAsc ? va.localeCompare(vb,undefined,{numeric:true}) : vb.localeCompare(va,undefined,{numeric:true});
  });
  rows.forEach(r => body.appendChild(r));
  // update header arrows
  document.querySelectorAll('#previewHead th').forEach((th,j) => {
    th.className = j===i ? (sortAsc ? 'sorted-asc' : 'sorted-desc') : '';
  });
}

async function clearAll() {
  if (!confirm('Delete ALL records from the master database?')) return;
  try {
    await fetch('/master?confirm=yes', { method:'DELETE' });
    document.getElementById('uploadLog').innerHTML += `<span class="ok">Database cleared.</span>\n`;
  } catch(e) { document.getElementById('uploadLog').innerHTML += `<span class="err">Clear failed.</span>\n`; }
  refreshStats(); refreshPreview();
}

setupDrop('outputZone', 'outputInput', files => {
  outputFile = files[0];
  document.getElementById('outputFilename').textContent = `Selected: ${outputFile.name}`;
  document.getElementById('generateBtn').style.display = 'inline-block';
  document.getElementById('outputSummary').style.display = 'none';
});

async function generateOutput() {
  if (!outputFile) return;
  const status = document.getElementById('outputStatus');
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  status.innerHTML = '<span class="loading">Processing... matching records...</span>';
  try {
    const fd = new FormData();
    fd.append('file', outputFile);
    const res = await fetch('/generate-output', { method:'POST', body:fd });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Server error'); }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = res.headers.get('Content-Disposition')?.match(/filename="(.+)"/)?.[1] || `output_${new Date().toISOString().slice(0,10)}.xlsx`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    status.textContent = '';
    const summary = document.getElementById('outputSummary');
    summary.style.display = 'block';
    summary.innerHTML = `<strong>Done.</strong> ${res.headers.get('X-Enriched')||'?'} rows enriched, ${res.headers.get('X-Mobiles-Added')||'?'} mobile numbers added.`;
  } catch(e) { status.innerHTML = `<span class="err">Error: ${e.message}</span>`; }
  btn.disabled = false;
}

refreshStats(); refreshPreview();
</script>
</body>
</html>
