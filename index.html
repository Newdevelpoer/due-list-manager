<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insurance Policy Manager</title>
<meta name="description" content="Upload, search, and manage insurance policy data with smart matching and output generation.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ──────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:      #0f1117;
  --surface: #1a1d27;
  --card:    rgba(255,255,255,0.04);
  --border:  rgba(255,255,255,0.08);
  --text:    #e4e4e7;
  --muted:   #71717a;
  --accent:  #6366f1;
  --accent2: #818cf8;
  --green:   #22c55e;
  --red:     #ef4444;
  --amber:   #f59e0b;
  --glass:   rgba(255,255,255,0.03);
  --radius:  12px;
  --shadow:  0 4px 24px rgba(0,0,0,0.3);
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.5;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(ellipse 600px 400px at 15% 10%, rgba(99,102,241,0.12), transparent),
    radial-gradient(ellipse 500px 350px at 85% 80%, rgba(139,92,246,0.08), transparent),
    radial-gradient(ellipse 400px 300px at 50% 50%, rgba(34,197,94,0.04), transparent);
}

.container{max-width:1280px;margin:0 auto;padding:24px 20px 60px}

/* ── Header ────────────────────────────────────────── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;padding-bottom:20px;
  border-bottom:1px solid var(--border);
}
.header-left{display:flex;align-items:center;gap:14px}
.logo{
  width:42px;height:42px;border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#a855f7);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;color:#fff;
  box-shadow:0 0 20px rgba(99,102,241,0.3);
}
.header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.header h1 span{
  background:linear-gradient(135deg,var(--accent2),#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.version{
  font-size:11px;color:var(--muted);
  background:var(--card);border:1px solid var(--border);
  padding:4px 10px;border-radius:20px;
  font-weight:500;letter-spacing:0.5px;
}

/* ── Search Bar ────────────────────────────────────── */
.search-wrapper{
  position:relative;margin-bottom:24px;
}
.search-wrapper .search-icon{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  font-size:18px;color:var(--muted);pointer-events:none;
  transition:color .2s;
}
.search-wrapper input{
  width:100%;padding:14px 44px 14px 48px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);
  font-family:inherit;font-size:15px;font-weight:400;
  outline:none;transition:all .25s ease;
}
.search-wrapper input::placeholder{color:var(--muted)}
.search-wrapper input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(99,102,241,0.15);
  background:rgba(255,255,255,0.06);
}
.search-wrapper input:focus ~ .search-icon{color:var(--accent2)}
.search-clear{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.08);border:none;
  width:26px;height:26px;border-radius:50%;
  color:var(--muted);font-size:15px;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  transition:all .15s;
}
.search-clear:hover{background:rgba(255,255,255,0.15);color:var(--text)}
.search-results-info{
  font-size:13px;color:var(--muted);margin-bottom:14px;
  display:none;padding-left:4px;
}

/* ── Cards Grid ────────────────────────────────────── */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  backdrop-filter:blur(12px);
  transition:border-color .2s, box-shadow .2s;
}
.card:hover{border-color:rgba(255,255,255,0.12);box-shadow:var(--shadow)}
.card-label{
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--muted);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.card-label .step{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:6px;font-size:11px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),#a855f7);color:#fff;
}

/* ── Drop Zones ────────────────────────────────────── */
.drop-zone{
  border:2px dashed rgba(255,255,255,0.1);
  border-radius:10px;padding:28px 16px;
  text-align:center;cursor:pointer;
  background:rgba(255,255,255,0.015);
  transition:all .25s ease;
}
.drop-zone:hover{
  border-color:var(--accent);
  background:rgba(99,102,241,0.06);
}
.drop-zone.over{
  border-color:var(--accent2);
  background:rgba(99,102,241,0.1);
  transform:scale(1.01);
}
.drop-zone input{display:none}
.drop-zone .dz-icon{font-size:28px;margin-bottom:8px;opacity:0.7}
.drop-zone .dz-text{font-size:14px;font-weight:500;color:var(--text);opacity:0.85}
.drop-zone .dz-hint{font-size:11px;color:var(--muted);margin-top:6px}

/* ── Buttons ───────────────────────────────────────── */
.btn{
  padding:8px 20px;border:none;border-radius:8px;
  cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;
  transition:all .2s ease;user-select:none;
  display:inline-flex;align-items:center;gap:6px;
}
.btn:active{transform:scale(0.97)}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;
  box-shadow:0 2px 12px rgba(99,102,241,0.25);
}
.btn-primary:hover{box-shadow:0 4px 20px rgba(99,102,241,0.4);transform:translateY(-1px)}
.btn-danger{
  background:rgba(239,68,68,0.1);color:var(--red);
  border:1px solid rgba(239,68,68,0.2);
}
.btn-danger:hover{background:rgba(239,68,68,0.2)}
.btn-go{
  background:rgba(34,197,94,0.1);color:var(--green);
  border:1px solid rgba(34,197,94,0.2);margin-top:10px;
}
.btn-go:hover{background:rgba(34,197,94,0.2)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none !important;box-shadow:none !important}
.filename{font-size:12px;margin-top:8px;color:var(--muted)}
.summary{
  background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);
  padding:10px 14px;border-radius:8px;margin-top:10px;font-size:13px;color:var(--green);
  display:none;
}
.loading{color:var(--amber);font-style:italic}

/* ── Log Console ───────────────────────────────────── */
.log{
  background:rgba(0,0,0,0.4);border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px 16px;font-size:13px;font-family:'JetBrains Mono','Fira Code','Courier New',monospace;
  max-height:140px;overflow-y:auto;margin-bottom:20px;
  white-space:pre-wrap;min-height:40px;color:var(--muted);
  line-height:1.7;
}
.log .err{color:var(--red)}
.log .ok{color:var(--green)}

/* ── Stats Bar ─────────────────────────────────────── */
.stats-bar{
  display:flex;align-items:center;gap:6px;
  margin-bottom:16px;flex-wrap:wrap;
}
.stat-chip{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:8px 14px;
  font-size:12px;color:var(--muted);font-weight:500;
  display:flex;align-items:center;gap:6px;
}
.stat-chip .stat-val{color:var(--text);font-weight:700;font-size:14px}
.stat-chip .stat-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.stats-bar .spacer{flex:1}

/* ── Table ─────────────────────────────────────────── */
.table-container{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:2}
th{
  background:rgba(255,255,255,0.06);
  color:var(--muted);font-weight:600;font-size:11px;
  text-transform:uppercase;letter-spacing:0.8px;
  padding:12px 14px;text-align:left;white-space:nowrap;
  cursor:pointer;user-select:none;border-bottom:1px solid var(--border);
  transition:color .15s, background .15s;
}
th:hover{color:var(--text);background:rgba(255,255,255,0.09)}
th.sorted-asc{color:var(--accent2)}
th.sorted-desc{color:var(--accent2)}
th.sorted-asc::after{content:" ↑";font-size:11px;color:var(--accent2)}
th.sorted-desc::after{content:" ↓";font-size:11px;color:var(--accent2)}
td{
  padding:10px 14px;text-align:left;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:160px;
  border-bottom:1px solid rgba(255,255,255,0.03);
  cursor:pointer;transition:all .12s ease;
  font-variant-numeric:tabular-nums;
}
tbody tr{transition:background .12s ease}
tbody tr:hover{background:rgba(99,102,241,0.06)}
tbody tr:hover td{color:#fff}
td.copied{background:rgba(34,197,94,0.15) !important;color:var(--green) !important;transition:background 0s}
.table-empty{padding:40px;text-align:center;color:var(--muted);font-size:14px}

/* ── Copy Toast ────────────────────────────────────── */
.copy-toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,#1e1e2e,#2a2a3e);
  color:#fff;padding:10px 24px;border-radius:10px;
  font-size:13px;font-weight:500;font-family:'Inter',sans-serif;
  opacity:0;transition:all .3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;z-index:999;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.08);
  white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:8px;
}
.copy-toast .toast-icon{color:var(--green);font-size:16px}
.copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Responsive ────────────────────────────────────── */
@media(max-width:768px){
  .cards{grid-template-columns:1fr}
  .header{flex-direction:column;align-items:flex-start;gap:12px}
  .container{padding:16px 14px 40px}
  .stats-bar{flex-direction:column;align-items:stretch}
  .stats-bar .spacer{display:none}
  td{padding:8px 10px;font-size:12px}
  th{padding:10px;font-size:10px}
}

/* ── Scrollbar ─────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.18)}

/* ── Animations ────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card,.search-wrapper,.stats-bar,.table-container,.log{animation:fadeIn .4s ease both}
.card:nth-child(2){animation-delay:.05s}
.search-wrapper{animation-delay:.08s}
.log{animation-delay:.12s}
.stats-bar{animation-delay:.15s}
.table-container{animation-delay:.18s}
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">IP</div>
      <h1>Insurance <span>Policy Manager</span></h1>
    </div>
    <span class="version">v1.2.1</span>
  </div>

  <!-- Search -->
  <div class="search-wrapper">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search by policy number…" autocomplete="off" spellcheck="false">
    <button class="search-clear" id="searchClear" title="Clear search">&times;</button>
  </div>
  <div class="search-results-info" id="searchInfo"></div>

  <!-- Upload & Generate -->
  <div class="cards">
    <div class="card">
      <div class="card-label"><span class="step">1</span> Upload Master Data</div>
      <div class="drop-zone" id="uploadZone">
        <div class="dz-icon">📂</div>
        <div class="dz-text">Drop files here or click to upload</div>
        <div class="dz-hint">.xlsx .xls .xlsm .csv .jpg .jpeg .png .doc .docx — multiple files OK</div>
        <input type="file" id="uploadInput" multiple accept=".xlsx,.xls,.xlsm,.csv,.jpg,.jpeg,.png,.doc,.docx">
      </div>
    </div>
    <div class="card">
      <div class="card-label"><span class="step">2</span> Generate Output Sheet</div>
      <div class="drop-zone" id="outputZone">
        <div class="dz-icon">📄</div>
        <div class="dz-text">Drop authority Excel file here or click</div>
        <div class="dz-hint">.xlsx .xls only — single file</div>
        <input type="file" id="outputInput" accept=".xlsx,.xls">
      </div>
      <div class="filename" id="outputFilename"></div>
      <button class="btn btn-go" id="generateBtn" onclick="generateOutput()" style="display:none">⚙ Generate Output</button>
      <div id="outputStatus"></div>
      <div class="summary" id="outputSummary"></div>
    </div>
  </div>

  <!-- Log -->
  <div class="log" id="uploadLog">▸ Ready.</div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-chip"><span class="stat-dot"></span> Records <span class="stat-val" id="totalCount">0</span></div>
    <div class="stat-chip">Last update <span class="stat-val" id="lastUpdate">—</span></div>
    <div class="spacer"></div>
    <button class="btn btn-danger" onclick="clearAll()">✕ Clear All Data</button>
  </div>

  <!-- Table -->
  <div class="table-container">
    <div class="table-scroll">
      <table id="previewTable">
        <thead><tr id="previewHead"></tr></thead>
        <tbody id="previewBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Copy toast -->
<div class="copy-toast" id="copyToast"><span class="toast-icon">✓</span><span id="toastText"></span></div>

<script>
const COLS = ['sn','policyno','name','doc','fup','sumass','plan','mode','premium','mobileno','status'];
const COL_LABELS = {sn:'SN',policyno:'Policy No',name:'Name',doc:'DOC',fup:'FUP',sumass:'Sum Assured',plan:'Plan',mode:'Mode',premium:'Premium',mobileno:'Mobile',status:'Status'};
let sortCol = -1, sortAsc = true, outputFile = null;
let searchMode = false, searchDebounce = null;

/* ── Copy to clipboard ─────────────────────────────── */
function showToast(msg) {
  const toast = document.getElementById('copyToast');
  const toastText = document.getElementById('toastText');
  toastText.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 1800);
}

function copyCell(td) {
  const text = td.textContent || '';
  if (!text.trim()) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      flashCell(td);
      showToast('Copied: ' + (text.length > 36 ? text.slice(0,36)+'…' : text));
    }).catch(() => fallbackCopy(td, text));
  } else {
    fallbackCopy(td, text);
  }
}

function fallbackCopy(td, text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); flashCell(td); showToast('Copied: ' + (text.length>36?text.slice(0,36)+'…':text)); }
  catch(e) { showToast('Copy failed'); }
  document.body.removeChild(ta);
}

function flashCell(td) {
  td.classList.add('copied');
  setTimeout(() => td.classList.remove('copied'), 500);
}

/* ── Search ────────────────────────────────────────── */
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchInfo = document.getElementById('searchInfo');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.style.display = q ? 'flex' : 'none';
  clearTimeout(searchDebounce);
  if (!q) {
    searchMode = false;
    searchInfo.style.display = 'none';
    refreshPreview();
    return;
  }
  searchDebounce = setTimeout(() => performSearch(q), 300);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    clearTimeout(searchDebounce);
    const q = searchInput.value.trim();
    if (q) performSearch(q);
  }
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.style.display = 'none';
  searchMode = false;
  searchInfo.style.display = 'none';
  refreshPreview();
  searchInput.focus();
});

async function performSearch(query) {
  searchMode = true;
  try {
    const rows = await (await fetch('/search?q='+encodeURIComponent(query))).json();
    searchInfo.style.display = 'block';
    searchInfo.textContent = rows.length === 0
      ? `No policies found matching "${query}"`
      : `Found ${rows.length} polic${rows.length===1?'y':'ies'} matching "${query}"`;
    renderTable(rows);
  } catch(e) {
    searchInfo.style.display = 'block';
    searchInfo.textContent = 'Search error: '+e.message;
  }
}

/* ── Table rendering ───────────────────────────────── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTable(rows) {
  const head = document.getElementById('previewHead');
  const body = document.getElementById('previewBody');
  head.innerHTML = COLS.map((c,i) => {
    let cls = '';
    if (sortCol === i) cls = sortAsc ? 'sorted-asc' : 'sorted-desc';
    return `<th class="${cls}" onclick="sortPreview(${i})">${COL_LABELS[c]||c}</th>`;
  }).join('');
  if (rows.length === 0) {
    body.innerHTML = `<tr><td colspan="${COLS.length}" class="table-empty">No records to display</td></tr>`;
    return;
  }
  body.innerHTML = rows.map(r =>
    '<tr>' + COLS.map(c => {
      const val = r[c] || '';
      return `<td title="${esc(val)}" onclick="copyCell(this)">${esc(val)}</td>`;
    }).join('') + '</tr>'
  ).join('');
}

/* ── Drag & drop ───────────────────────────────────── */
function setupDrop(zoneId, inputId, handler) {
  const zone = document.getElementById(zoneId), input = document.getElementById(inputId);
  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('over'); handler(e.dataTransfer.files); });
  input.addEventListener('change', () => { if(input.files.length) handler(input.files); input.value=''; });
}

setupDrop('uploadZone', 'uploadInput', async files => {
  const log = document.getElementById('uploadLog');
  log.textContent = '';
  const fd = new FormData();
  for (const f of files) { fd.append('files', f); log.innerHTML += `▸ Uploading ${f.name}…\n`; }
  try {
    const res = await fetch('/upload', { method:'POST', body:fd });
    const data = await res.json();
    log.innerHTML += `<span class="ok">✓ Done — ${data.inserted} inserted, ${data.updated} updated</span>\n`;
    if (data.errors.length) data.errors.forEach(e => log.innerHTML += `<span class="err">✗ ${e.file}: ${e.error}</span>\n`);
  } catch(e) { log.innerHTML += `<span class="err">✗ Upload failed: ${e.message}</span>\n`; }
  log.scrollTop = log.scrollHeight;
  refreshStats(); refreshPreview();
});

async function refreshStats() {
  try {
    const data = await (await fetch('/master/count')).json();
    document.getElementById('totalCount').textContent = data.count.toLocaleString();
    document.getElementById('lastUpdate').textContent = data.last_updated || '—';
  } catch(e) {}
}

async function refreshPreview() {
  if (searchMode) return;
  try {
    const rows = await (await fetch('/master?limit=50')).json();
    renderTable(rows);
  } catch(e) {}
}

function sortPreview(i) {
  if (sortCol===i) sortAsc=!sortAsc; else { sortCol=i; sortAsc=true; }
  const body = document.getElementById('previewBody');
  const rows = [...body.querySelectorAll('tr')];
  rows.sort((a,b) => {
    const va=a.children[i]?.textContent||'', vb=b.children[i]?.textContent||'';
    return sortAsc ? va.localeCompare(vb,undefined,{numeric:true}) : vb.localeCompare(va,undefined,{numeric:true});
  });
  rows.forEach(r => body.appendChild(r));
  document.querySelectorAll('#previewHead th').forEach((th,j) => {
    th.className = j===i ? (sortAsc?'sorted-asc':'sorted-desc') : '';
  });
}

async function clearAll() {
  if (!confirm('Delete ALL records from the master database? This cannot be undone.')) return;
  try {
    await fetch('/master?confirm=yes', { method:'DELETE' });
    document.getElementById('uploadLog').innerHTML += `<span class="ok">✓ Database cleared.</span>\n`;
  } catch(e) { document.getElementById('uploadLog').innerHTML += `<span class="err">✗ Clear failed.</span>\n`; }
  refreshStats(); refreshPreview();
}

setupDrop('outputZone', 'outputInput', files => {
  outputFile = files[0];
  document.getElementById('outputFilename').textContent = `Selected: ${outputFile.name}`;
  document.getElementById('generateBtn').style.display = 'inline-flex';
  document.getElementById('outputSummary').style.display = 'none';
});

async function generateOutput() {
  if (!outputFile) return;
  const status = document.getElementById('outputStatus');
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  status.innerHTML = '<span class="loading">⏳ Processing… matching records…</span>';
  try {
    const fd = new FormData();
    fd.append('file', outputFile);
    const res = await fetch('/generate-output', { method:'POST', body:fd });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail||'Server error'); }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = res.headers.get('Content-Disposition')?.match(/filename="(.+)"/)?.[1]||`output_${new Date().toISOString().slice(0,10)}.xlsx`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    status.textContent = '';
    const summary = document.getElementById('outputSummary');
    summary.style.display = 'block';
    summary.innerHTML = `<strong>✓ Done.</strong> ${res.headers.get('X-Enriched')||'?'} rows enriched, ${res.headers.get('X-Mobiles-Added')||'?'} mobile numbers added.`;
  } catch(e) { status.innerHTML = `<span class="err">✗ Error: ${e.message}</span>`; }
  btn.disabled = false;
}

refreshStats(); refreshPreview();
</script>
</body>
</html>
