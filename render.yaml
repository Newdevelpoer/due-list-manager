services:
  - type: web
    name: due-list-manager
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # you'll enter this manually in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.9"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
